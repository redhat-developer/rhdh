kind: Backstage
apiVersion: rhdh.redhat.com/v1alpha2
metadata:
  name: rhdh-orchestrator
spec:
  application:
    image: 'quay.io/$QUAY_REPO:$TAG_NAME'
    appConfig:
      configMaps:
        - name: app-config-rhdh
        - name: dynamic-plugins-orchestrator-config
        - name: dynamic-global-floating-action-button-config
        - name: dynamic-global-header-config
      mountPath: /opt/app-root/src
    dynamicPluginsConfigMapName: dynamic-plugins-orchestrator
    extraEnvs:
      envs:
        - name: NODE_OPTIONS
          value: '--no-node-snapshot'
        - name: NODE_ENV
          value: 'production'
        - name: NODE_TLS_REJECT_UNAUTHORIZED
          value: '0'
        # Orchestrator-specific environment variables
        - name: ORCHESTRATOR_DB_HOST
          value: 'postgres-service'
        - name: ORCHESTRATOR_DB_PORT
          value: '5432'
        - name: ORCHESTRATOR_DB_NAME
          value: 'backstage_plugin_orchestrator'
        - name: ORCHESTRATOR_DB_USER
          value: 'postgres'
        - name: SONATAFLOW_PLATFORM_NAMESPACE
          value: '$BACKSTAGE_NS'
      secrets:
        - name: rhdh-secrets
        - name: redis-secret
        - name: postgres-secret