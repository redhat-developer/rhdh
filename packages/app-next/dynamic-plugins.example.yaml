# Example dynamic-plugins set for a typical RHDH NFS (app-next) local experience.
#
# Install into dynamic-plugins-root (from the repo root), then start with
# `yarn workspace backend start:next`:
#
#   cp packages/app-next/dynamic-plugins.example.yaml dynamic-plugins.yaml
#   npx -y @red-hat-developer-hub/cli-module-install-dynamic-plugins@0.2.0 \
#     install dynamic-plugins-root
#
# Or merge the `plugins:` entries into your own dynamic-plugins.yaml / Helm
# `global.dynamic.plugins` values. See also e2e-tests/local-harness/populate.sh.
#
# Sign-in comes from app-auth (not a static module in app-next), so it stays
# swappable. Pair with app-integrations when you need default SCM auth APIs.
#
# The commented entries under "Additional packages.enabled" mirror the enabled
# list in rhdh-plugin-export-overlays/default.packages.yaml — uncomment as needed.
#
# NOTE: Overlay tags below track published OCI builds and may lag the Backstage
# version in this repo. Prefer matching `bs_<backstage>__<plugin>` tags when
# available; otherwise use the newest published tag for each package.

plugins:
  # --- Minimal NFS shell UX (enabled by default in this example) ---

  # RHDH multi-provider sign-in page + OIDC/Auth0/SAML frontend APIs
  - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-app-auth:next__0.0.2!red-hat-developer-hub-backstage-plugin-app-auth
    disabled: false

  # Default SCM integrations / scmAuth wiring (github, gitlab, azure, bitbucket)
  - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-app-integrations:next__0.0.2!red-hat-developer-hub-backstage-plugin-app-integrations
    disabled: false

  # RHDH theme — OCI tags are still OFS-shaped; leave commented until NFS overlay exists.
  # Optional local NFS: export from rhdh-plugins (packages/app-next/README.md).
  # - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-theme:next__0.14.5!red-hat-developer-hub-backstage-plugin-theme
  #   disabled: false

  # Homepage — OCI still OFS-shaped. app-next mounts homePageModule statically so
  # NFS / works for card verification. Do not enable this OCI tag (overwrites a
  # local homepage export). See README → Testing homepage cards / Local NFS export.
  # - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-homepage:pr_2644__1.15.0!red-hat-developer-hub-backstage-plugin-homepage
  #   disabled: false

  # Global header (@red-hat-developer-hub/backstage-plugin-global-header)
  - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-global-header:next__1.21.6!red-hat-developer-hub-backstage-plugin-global-header
    disabled: false

  # Quickstart drawer + help menu item (@red-hat-developer-hub/backstage-plugin-quickstart)
  - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-quickstart:pr_2591__1.10.0!red-hat-developer-hub-backstage-plugin-quickstart
    disabled: false

  # --- Additional packages.enabled (from default.packages.yaml) ---
  # Uncomment entries you need. Source:
  # https://github.com/redhat-developer/rhdh-plugin-export-overlays/blob/main/default.packages.yaml
  #
  # (global-header and quickstart are already enabled above.)

