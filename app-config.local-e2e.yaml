# Config overlay for the cluster-free local E2E harness (legacy `packages/app`, Tier B).
#
# Layered on top of app-config.yaml and app-config.dynamic-plugins.yaml to run
# Playwright E2E without an OpenShift/Kubernetes cluster or container images:
#
#   yarn --cwd e2e-tests e2e:legacy-local
#
# It enables guest sign-in (the auth backend rejects guest unless a provider is
# configured) and pins the in-memory SQLite database so a single `run` is fully
# self-contained. See docs/e2e-tests/local-e2e-harness.md.
#
# NOTE: test-only. This grants unauthenticated guest access
# (dangerouslyAllowOutsideDevelopment) and must never be layered into a
# production config.
auth:
  environment: development
  providers:
    guest:
      userEntityRef: user:default/guest
      # Required because auth.environment may resolve outside "development" in CI.
      dangerouslyAllowOutsideDevelopment: true

backend:
  database:
    client: better-sqlite3
    connection: ":memory:"

# The e2e specs are written against the CI deployment's customization
# (.ci/pipelines/resources/config_map/dynamic-plugins-config.yaml): APIs and
# Learning Paths nest under a "References" sidebar group, and the home page
# carries the extra test cards (Placeholder/Markdown/Featured Docs/Random
# Joke/Top + Recently Visited). Mirror those blocks here so the specs pass
# off-cluster. The home-page mountPoints array REPLACES the one from the
# static app-config.dynamic-plugins.yaml (arrays substitute on config merge),
# so it is the CI list verbatim, superset of the static one.
dynamicPlugins:
  frontend:
    default.main-menu-items:
      menuItems:
        default.list:
          title: References
          icon: bookmarks
        default.apis:
          parent: default.list
        default.learning-path:
          parent: default.list
        default.test_enabled:
          title: Test enabled
          enabled: true
        default.test_nested_enabled:
          parent: default.test_enabled
          title: Test nested enabled
          enabled: true
        default.test_nested_disabled:
          parent: default.test_enabled
          title: Test nested disabled
          enabled: false
        default.test_disabled:
          title: Test disabled
          enabled: false
    backstage.plugin-techdocs:
      menuItems:
        favorites:
          title: Favorites
          icon: star
          priority: 10
        docs:
          parent: favorites
          priority: 1
        test_i_enabled:
          title: Test_i enabled
          priority: 20
          enabled: true
        test_i_disabled:
          title: Test_i disabled
          priority: 20
          enabled: false
    red-hat-developer-hub.backstage-plugin-dynamic-home-page:
      mountPoints:
        - mountPoint: application/listener
          importName: VisitListener
        - mountPoint: home.page/cards
          importName: SearchBar
          config:
            layouts:
              xl: { w: 10, h: 1, x: 1 }
              lg: { w: 10, h: 1, x: 1 }
              md: { w: 10, h: 1, x: 1 }
              sm: { w: 10, h: 1, x: 1 }
              xs: { w: 12, h: 1 }
              xxs: { w: 12, h: 1 }
        - mountPoint: home.page/cards
