# Config overlay shared by the cluster-free local E2E harnesses (legacy `packages/app`
# and new `packages/app-next`).
#
# Layered on top of app-config.yaml (and, for the legacy Tier B harness, on top of
# app-config.dynamic-plugins.yaml) to run Playwright E2E without an
# OpenShift/Kubernetes cluster or container images:
#
#   yarn --cwd e2e-tests e2e:legacy-local     # legacy app + dynamic plugins (Tier B)
#   yarn --cwd e2e-tests e2e:app-next-local   # new frontend system
#
# It enables guest sign-in (the auth backend rejects guest unless a provider is
# configured) and pins the in-memory SQLite database so a single `run` is fully
# self-contained. See docs/e2e-tests/local-e2e-harness.md.
auth:
  environment: development
  providers:
    guest:
      userEntityRef: user:default/guest
      # Required because auth.environment may resolve outside "development" in CI.
      dangerouslyAllowOutsideDevelopment: true

backend:
  database:
    client: better-sqlite3
    connection: ":memory:"
