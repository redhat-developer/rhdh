# Serves catalog-info.yaml in-cluster so Backstage can register a location
# without depending on GitHub raw URLs from fork PRs.
# Image/command placeholders are substituted by deploy_pg_upgrade_data_proof_fixture().
apiVersion: v1
kind: ConfigMap
metadata:
  name: pg-upgrade-data-proof
  labels:
    app: pg-upgrade-data-proof
data:
  catalog-info.yaml: |
    apiVersion: backstage.io/v1alpha1
    kind: Component
    metadata:
      name: pg-upgrade-data-proof
      title: PG Upgrade Data Proof
      description: RHIDP-14594 persistence proof seeded before PostgreSQL major upgrade
      tags:
        - pg-upgrade-proof
        - rhidp-14594
    spec:
      type: service
      lifecycle: experimental
      owner: guests
  serve.py: |
    #!/usr/bin/env python3
    from http.server import SimpleHTTPRequestHandler, ThreadingHTTPServer
    import os
    os.chdir("/www")
    ThreadingHTTPServer(("0.0.0.0", 8080), SimpleHTTPRequestHandler).serve_forever()
  serve.js: |
    const http = require("http");
    const fs = require("fs");
    const path = require("path");
    http.createServer((req, res) => {
      const file = path.join("/www", req.url === "/" ? "catalog-info.yaml" : req.url);
      fs.readFile(file, (err, data) => {
        if (err) { res.writeHead(404); res.end(String(err)); return; }
        res.writeHead(200, { "Content-Type": "text/yaml" });
        res.end(data);
      });
    }).listen(8080, "0.0.0.0");
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pg-upgrade-data-proof
  labels:
    app: pg-upgrade-data-proof
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pg-upgrade-data-proof
  template:
    metadata:
      labels:
        app: pg-upgrade-data-proof
    spec:
      containers:
        - name: http
          image: PG_UPGRADE_DATA_PROOF_IMAGE
          imagePullPolicy: IfNotPresent
          command:
            - PG_UPGRADE_DATA_PROOF_COMMAND
          args:
            - PG_UPGRADE_DATA_PROOF_SCRIPT
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: www
              mountPath: /www
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
      volumes:
        - name: www
          configMap:
            name: pg-upgrade-data-proof
            defaultMode: 0555
---
apiVersion: v1
kind: Service
metadata:
  name: pg-upgrade-data-proof
  labels:
    app: pg-upgrade-data-proof
spec:
  selector:
    app: pg-upgrade-data-proof
  ports:
    - name: http
      port: 8080
      targetPort: 8080
