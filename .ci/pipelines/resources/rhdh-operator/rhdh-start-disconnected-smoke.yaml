# Minimal Backstage CR for disconnected operator smoke test.
# Smoke only needs: guest login → homepage. Avoid ConfigMaps/Secrets that the
# normal apply_yaml_files() flow creates (app-config-rhdh, dynamic-plugins-*,
# rhdh-secrets, redis-secret).
kind: Backstage
apiVersion: rhdh.redhat.com/v1alpha5
metadata:
  name: rhdh
spec:
  deployment:
    patch:
      spec:
        template:
          spec:
            containers:
              - name: backstage-backend
                image: "$IMAGE_REGISTRY/$IMAGE_REPO:$TAG_NAME"
            initContainers:
              - name: install-dynamic-plugins
                image: "$IMAGE_REGISTRY/$IMAGE_REPO:$TAG_NAME"
  application:
    appConfig:
      configMaps:
        - name: app-config-rhdh-disconnected-smoke
      mountPath: /opt/app-root/src
    extraEnvs:
      envs:
        - name: NODE_OPTIONS
          value: "--no-node-snapshot"
        - name: NODE_ENV
          value: "production"
        - name: NODE_TLS_REJECT_UNAUTHORIZED
          value: "0"
