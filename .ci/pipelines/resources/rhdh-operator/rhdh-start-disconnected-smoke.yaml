# Minimal Backstage CR for disconnected operator smoke test.
# Smoke only needs: guest login → homepage. Avoid ConfigMaps/Secrets that the
# normal apply_yaml_files() flow creates (app-config-rhdh, dynamic-plugins-*,
# rhdh-secrets, redis-secret).
#
# flavours: [] disables default flavours (lightspeed) so the deployment does not
# pull/start lightspeed-core / init-rag-data sidecars.
#
# CATALOG_INDEX_IMAGE="" clears the operator profile default (quay.io digest).
# Helm disconnected mirrors that index via oc-mirror; the operator path does not,
# and install-dynamic-plugins skips catalog extraction when the env is empty.
# Smoke does not need marketplace/default plugin configs from the index.
kind: Backstage
apiVersion: rhdh.redhat.com/v1alpha5
metadata:
  name: rhdh
spec:
  flavours: []
  deployment:
    patch:
      spec:
        template:
          spec:
            containers:
              - name: backstage-backend
                image: "$IMAGE_REGISTRY/$IMAGE_REPO:$TAG_NAME"
            initContainers:
              - name: install-dynamic-plugins
                image: "$IMAGE_REGISTRY/$IMAGE_REPO:$TAG_NAME"
  application:
    appConfig:
      configMaps:
        - name: app-config-rhdh-disconnected-smoke
      mountPath: /opt/app-root/src
    extraEnvs:
      envs:
        - name: NODE_OPTIONS
          value: "--no-node-snapshot"
        - name: NODE_ENV
          value: "production"
        - name: NODE_TLS_REJECT_UNAUTHORIZED
          value: "0"
        - name: CATALOG_INDEX_IMAGE
          value: ""
          containers:
            - install-dynamic-plugins
