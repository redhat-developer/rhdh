global:
  # use the latest catalog index
  catalogIndex:
    image:
      registry: quay.io
      repository: rhdh/plugin-catalog-index
      tag: "1.11"
  dynamic:
    # -- Array of YAML files listing dynamic plugins to include with those listed in the `plugins` field.
    # Relative paths are resolved from the working directory of the initContainer that will install the plugins (`/opt/app-root/src`).
    # NOTE: dynamic-plugins.default.yaml from the catalog index is not included because the
    # :1.11 / :next index references OCI images on registry.access.redhat.com that are not
    # publicly accessible yet. All required plugins are listed explicitly below instead.

    # -- List of dynamic plugins.
    # Every item defines the plugin `package` as a [NPM package spec](https://docs.npmjs.com/cli/v10/using-npm/package-spec),
    # an optional `pluginConfig` with plugin-specific backstage configuration, and an optional `enabled` flag to enable/disable a plugin
    # listed in `includes` files. It also includes an `integrity` field that is used to verify the plugin package [integrity](https://w3c.github.io/webappsec-subresource-integrity/#integrity-metadata-description).
    plugins:
      # Core RHDH UI plugins — not available in :1.11 catalog index defaults, added explicitly
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-dynamic-home-page:bs_1.49.4__1.13.1!red-hat-developer-hub-backstage-plugin-dynamic-home-page"
        disabled: false
        pluginConfig:
          dynamicPlugins:
            frontend:
              red-hat-developer-hub.backstage-plugin-dynamic-home-page:
                dynamicRoutes:
                  - importName: DynamicHomePage
                    path: /
                mountPoints:
                  - importName: VisitListener
                    mountPoint: application/listener
                  - importName: SearchBar
                    mountPoint: home.page/cards
                    config:
                      id: searchbar
                      title: Search
                  - importName: QuickAccessCard
                    mountPoint: home.page/cards
                    config:
                      id: quickaccess-card
                      title: Quick Access Card
                  - importName: CatalogStarredEntitiesCard
                    mountPoint: home.page/cards
                    config:
                      id: catalog-starred-entities-card
                      title: Starred catalog entities
                  - importName: RecentlyVisitedCard
                    mountPoint: home.page/cards
                    config:
                      id: recently-visited-card
                      title: Recently visited
                  - importName: TopVisitedCard
                    mountPoint: home.page/cards
                    config:
                      id: top-visited-card
                      title: Top visited
                translationResources:
                  - importName: homepageTranslations
                    ref: homepageTranslationRef
                    module: Alpha
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-global-header:bs_1.49.4__1.21.6!red-hat-developer-hub-backstage-plugin-global-header"
        disabled: false
        pluginConfig:
          app:
            sidebar:
              logo: false
              search: false
              settings: false
          dynamicPlugins:
            frontend:
              default.main-menu-items:
                menuItems:
                  default.admin:
                    icon: admin
                    textKey: menuItem.administration
                    title: Administration
                  default.create:
                    title: ""
              red-hat-developer-hub.backstage-plugin-global-header:
                translationResources:
                  - importName: globalHeaderTranslations
                    ref: globalHeaderTranslationRef
                mountPoints:
                  - mountPoint: application/header
                    importName: GlobalHeader
                    config:
                      position: above-sidebar
                  - mountPoint: global.header/component
                    importName: CompanyLogo
                    config:
                      priority: 200
                      props:
                        to: "/"
                  - mountPoint: global.header/component
                    importName: SearchComponent
                    config:
                      priority: 100
                  - mountPoint: global.header/component
                    importName: Spacer
                    config:
                      priority: 99
                      props:
                        growFactor: 0
                  - mountPoint: global.header/component
                    importName: HeaderIconButton
                    config:
                      priority: 90
                      props:
                        title: Self-service
                        titleKey: create.title
                        icon: add
                        to: create
                  - mountPoint: global.header/component
                    importName: StarredDropdown
                    config:
                      priority: 85
                  - mountPoint: global.header/component
                    importName: ApplicationLauncherDropdown
                    config:
                      priority: 82
                  - mountPoint: global.header/component
                    importName: HelpDropdown
                    config:
                      priority: 80
                  - mountPoint: global.header/component
                    importName: NotificationButton
                    config:
                      priority: 70
                  - mountPoint: global.header/component
                    importName: Divider
                    config:
                      priority: 50
                  - mountPoint: global.header/component
                    importName: ProfileDropdown
                    config:
                      priority: 10
                  - mountPoint: global.header/profile
                    importName: MenuItemLink
                    config:
                      priority: 100
                      props:
                        title: Settings
                        titleKey: profile.settings
                        link: /settings
                        icon: manageAccounts
                  - mountPoint: global.header/profile
                    importName: MenuItemLink
                    config:
                      priority: 90
                      props:
                        title: My profile
                        titleKey: profile.myProfile
                        type: myProfile
                        icon: account
                  - mountPoint: global.header/profile
                    importName: LogoutButton
                    config:
                      priority: 10
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-plugin-scaffolder-backend-module-github:bs_1.52.0__0.9.10
        enabled: true
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-plugin-catalog-backend-module-github:bs_1.52.0__0.13.3
        enabled: true
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-application-provider-test:bs_1.45.3__0.6.0
        pluginConfig:
          dynamicPlugins:
            frontend:
              red-hat-developer-hub.backstage-plugin-application-provider-test:
                dynamicRoutes:
                  - path: /application-provider-test-page
                    importName: TestPage
                mountPoints:
                  - mountPoint: application/provider
                    importName: TestProviderOne
                  - mountPoint: application/provider
                    importName: TestProviderTwo
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-application-listener-test:bs_1.45.3__0.6.0
        pluginConfig:
          dynamicPlugins:
            frontend:
              red-hat-developer-hub.backstage-plugin-application-listener-test:
                mountPoints:
                  - mountPoint: application/listener
                    importName: LocationListener
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/roadiehq-backstage-plugin-github-pull-requests:bs_1.49.4__3.7.0"
        enabled: true
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-catalog-backend-module-keycloak:bs_1.49.4__3.19.2
        enabled: true
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-catalog-backend-module-scaffolder-relation-processor:bs_1.52.0__2.15.0
        enabled: true
      - package: "@backstage-community/plugin-todo@0.2.42"
        enabled: true
        integrity: sha512-agmfwxHkZPy0zaXzjMKY9Us9l7J2og+z7p2lDWQBmlJ1KZRo6OBQdnlG1mTEryfEEl/bx5Ko+f1PhFj2/BmiIQ==
# -- Upstream Backstage [chart configuration](https://github.com/backstage/charts/blob/main/charts/backstage/values.yaml)
upstream:
  nameOverride: developer-hub
  commonLabels:
    backstage.io/kubernetes-id: developer-hub
  backstage:
    appConfig:
      backend:
        auth:
          dangerouslyDisableDefaultAuthPolicy: true
          externalAccess:
            - type: static
              options:
                token: test-token
                subject: test-subject
    image:
      # Note: registry, repository and tag are set via --set flags in helm upgrade -i commands
      pullPolicy: Always

    extraEnvVars:
      - name: BACKEND_SECRET
        valueFrom:
          secretKeyRef:
            key: backend-secret
            name: '{{ include "rhdh.backend-secret-name" $ }}'
      - name: POSTGRESQL_ADMIN_PASSWORD
        valueFrom:
          secretKeyRef:
            key: postgres-password
            name: "{{ .Release.Name }}-postgresql"
      # disable telemetry in CI
      - name: SEGMENT_TEST_MODE
        value: "true"
      - name: NODE_TLS_REJECT_UNAUTHORIZED
        value: "0"
      - name: NODE_ENV
        value: "production"
      - name: ENABLE_CORE_ROOTHTTPROUTER_OVERRIDE
        value: "true"
    extraAppConfig:
      - configMapRef: app-config-rhdh
        filename: app-config-rhdh.yaml
      - configMapRef: dynamic-plugins-config
        filename: dynamic-plugins-config.yaml
    startupProbe:
      # This gives enough time upon container startup before the liveness and readiness probes are triggered.
      # Giving (120s = initialDelaySeconds + failureThreshold * periodSeconds) to account for the worst case scenario.
      httpGet:
        path: /.backstage/health/v1/liveness
        port: backend
        scheme: HTTP
      initialDelaySeconds: 30
      timeoutSeconds: 4
      periodSeconds: 20
      successThreshold: 1
      failureThreshold: 3
    readinessProbe:
      failureThreshold: 3
      httpGet:
        path: /.backstage/health/v1/readiness
        port: backend
        scheme: HTTP
      # Both liveness and readiness probes won't be triggered until the startup probe is successful.
      # The startup probe is already configured to give enough time for the application to be started.
      # So removing the additional delay here allows the readiness probe to be checked right away after the startup probe,
      # which helps make the application available faster to the end-user.
      # initialDelaySeconds: 30
      periodSeconds: 10
      successThreshold: 2
      timeoutSeconds: 4
    livenessProbe:
      failureThreshold: 3
      httpGet:
        path: /.backstage/health/v1/liveness
        port: backend
        scheme: HTTP
      # Both liveness and readiness probes won't be triggered until the startup probe is successful.
      # The startup probe is already configured to give enough time for the application to be started.
      # So removing the additional delay here allows the liveness probe to be checked right away after the startup probe,
      # which helps make the application available faster to the end-user.
      # initialDelaySeconds: 60
      periodSeconds: 10
      successThreshold: 1
      timeoutSeconds: 4
    extraEnvVarsSecrets:
      - rhdh-secrets
      - redis-secret
  ingress:
    host: "{{ .Values.global.host }}"

  service:
    extraPorts:
      - name: http-metrics
        port: 9464
        targetPort: 9464
