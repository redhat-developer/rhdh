route:
  enabled: true
global:
  dynamic:
    plugins:
    - package: ./dynamic-plugins/dist/backstage-community-plugin-tekton
      disabled: true
    - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-adoption-insights
      disabled: true
    - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-adoption-insights-backend-dynamic
      disabled: true
    - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-analytics-module-adoption-insights-dynamic
      disabled: true
    - package: oci://registry.access.redhat.com/rhdh/red-hat-developer-hub-backstage-plugin-orchestrator:{{
        "{{" }}inherit{{ "}}" }}
      disabled: true
    - package: oci://registry.access.redhat.com/rhdh/red-hat-developer-hub-backstage-plugin-orchestrator-backend:{{
        "{{" }}inherit{{ "}}" }}
      disabled: true
    - package: oci://registry.access.redhat.com/rhdh/red-hat-developer-hub-backstage-plugin-scaffolder-backend-module-orchestrator:{{
        "{{" }}inherit{{ "}}" }}
      disabled: true
    - package: oci://registry.access.redhat.com/rhdh/red-hat-developer-hub-backstage-plugin-orchestrator-form-widgets:{{
        "{{" }}inherit{{ "}}" }}
      disabled: true
upstream:
  backstage:
    appConfig:
      app:
        baseUrl: https://{{- include "rhdh.hostname" . }}
      backend:
        baseUrl: https://{{- include "rhdh.hostname" . }}
        cors:
          origin: https://{{- include "rhdh.hostname" . }}
        database:
          connection:
            host: null
            port: null
            password: ${POSTGRESQL_ADMIN_PASSWORD}
            user: postgres
            ssl: null
        auth:
          keys:
          - secret: ${BACKEND_SECRET}
    extraEnvVars:
    - name: BACKEND_SECRET
      valueFrom:
        secretKeyRef:
          key: backend-secret
          name: {{ include "rhdh.backend-secret-name" $ }}
    - name: POSTGRESQL_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          key: postgres-password
          name: {{ .Release.Name }}-postgresql
    - name: SEGMENT_TEST_MODE
      value: 'true'
    - name: NODE_TLS_REJECT_UNAUTHORIZED
      value: '0'
    - name: NODE_ENV
      value: production
    - name: ENABLE_CORE_ROOTHTTPROUTER_OVERRIDE
      value: 'true'
    extraVolumeMounts:
    - name: dynamic-plugins-root
      mountPath: /opt/app-root/src/dynamic-plugins-root
    - name: extensions-catalog
      mountPath: /extensions
    - name: temp
      mountPath: /tmp
    - name: rbac-policy
      mountPath: /opt/app-root/src/rbac
    extraVolumes:
    - name: dynamic-plugins-root
      emptyDir: {}
    - name: dynamic-plugins
      configMap:
        defaultMode: 420
        name: {{ printf "%s-dynamic-plugins" .Release.Name }}
        optional: true
    - name: dynamic-plugins-npmrc
      secret:
        defaultMode: 420
        optional: true
        secretName: {{ printf "%s-dynamic-plugins-npmrc" .Release.Name
          }}
    - name: dynamic-plugins-registry-auth
      secret:
        defaultMode: 416
        optional: true
        secretName: {{ printf "%s-dynamic-plugins-registry-auth" .Release.Name
          }}
    - name: npmcacache
      emptyDir: {}
    - name: extensions-catalog
      emptyDir: {}
    - name: temp
      emptyDir: {}
    - name: rbac-policy
      configMap:
        defaultMode: 420
        name: rbac-policy
    extraEnvVarsSecrets:
    - rhdh-secrets
    podSecurityContext:
      fsGroup: 2000
    startupProbe:
      failureThreshold: 3
  postgresql:
    enabled: true
    postgresqlDataDir: /var/lib/pgsql/data/userdata
    image:
      registry: quay.io
      repository: fedora/postgresql-15
      tag: latest
    auth:
      secretKeys:
        adminPasswordKey: postgres-password
        userPasswordKey: password
      existingSecret: null
    primary:
      securityContext:
        enabled: false
      podSecurityContext:
        enabled: false
        fsGroup: 3000
      containerSecurityContext:
        enabled: false
      persistence:
        enabled: true
        size: 1Gi
        mountPath: /var/lib/pgsql/data
      extraEnvVars:
      - name: POSTGRESQL_ADMIN_PASSWORD
        valueFrom:
          secretKeyRef:
            key: postgres-password
            name: {{ .Release.Name }}-postgresql
  volumePermissions:
    enabled: true
  service:
    type: NodePort
  ingress:
    enabled: true
    host: {{ .Values.global.host }}
    annotations:
      kubernetes.io/ingress.class: gce
      kubernetes.io/ingress.global-static-ip-name: rhdh-static-ip
      ingress.gcp.kubernetes.io/pre-shared-cert: ''
      networking.gke.io/v1beta1.FrontendConfig: rhdh-gke-ingress-security-config
    className: gce
orchestrator:
  enabled: false
  serverlessLogicOperator:
    enabled: true
  serverlessOperator:
    enabled: true
  sonataflowPlatform:
    monitoring:
      enabled: true
    eventing:
      broker:
        name: ''
        namespace: ''
    resources:
      requests:
        memory: 64Mi
        cpu: 250m
      limits:
        memory: 1Gi
        cpu: 500m
    externalDBsecretRef: ''
    externalDBName: ''
    externalDBHost: ''
    externalDBPort: ''
    initContainerImage: {{ .Values.upstream.postgresql.image.registry }}/{{
      .Values.upstream.postgresql.image.repository }}:{{ .Values.upstream.postgresql.image.tag
      }}
    createDBJobImage: {{ .Values.upstream.postgresql.image.registry }}/{{
      .Values.upstream.postgresql.image.repository }}:{{ .Values.upstream.postgresql.image.tag
      }}
    jobServiceImage: ''
    dataIndexImage: ''
  plugins:
  - package: oci://registry.access.redhat.com/rhdh/red-hat-developer-hub-backstage-plugin-orchestrator-backend:{{
      "{{inherit}}" }}
    disabled: false
  - package: oci://registry.access.redhat.com/rhdh/red-hat-developer-hub-backstage-plugin-orchestrator-form-widgets:{{
      "{{inherit}}" }}
    disabled: false
  - package: oci://registry.access.redhat.com/rhdh/red-hat-developer-hub-backstage-plugin-orchestrator:{{
      "{{inherit}}" }}
    disabled: false
  - package: oci://registry.access.redhat.com/rhdh/red-hat-developer-hub-backstage-plugin-scaffolder-backend-module-orchestrator:{{
      "{{inherit}}" }}
    disabled: false
