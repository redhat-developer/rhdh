# Minimal Helm values for disconnected smoke test.
# The smoke test only verifies: login page renders → guest login → homepage.
# No GitHub integrations, external secrets, dynamic plugins, or OIDC needed.
# All optional features (lightspeed, orchestrator) are disabled to avoid
# pulling extra images and referencing missing ConfigMaps/Secrets.
global:
  lightspeed:
    enabled: false
orchestrator:
  enabled: false
upstream:
  backstage:
    image:
      pullPolicy: Always
    appConfig:
      auth:
        environment: development
        providers:
          guest:
            dangerouslyAllowOutsideDevelopment: true
