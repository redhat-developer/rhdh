# This file is for OSD-GCP RBAC installation only.
# It is applied by `helm upgrade` after the `values-showcase-rbac.yaml` is applied and only contains complementary differences for OSD-GCP.
# Note, that it overwrites the whole key that is present in this file.
# The only exception is global.dynamic.plugins, that gets merged with the base file.

# Disable orchestrator for OSD-GCP due to infrastructure limitations
orchestrator: null

global:
  dynamic:
    # Override includes to empty: the operator's init container image (rhdh-hub-rhel9)
    # does not contain dynamic-plugins.default.yaml and the catalog index mechanism
    # is not available, so {{inherit}} cannot resolve. All plugins must use explicit versions.
    # The {{inherit}} tags in the base file are replaced with explicit versions by
    # replace_inherit_with_explicit_versions() in ocp-operator.sh after merging.
    includes: []

    plugins:
      # Disable orchestrator plugins for OSD-GCP (explicit digests from catalog index 1.10)
      - package: "oci://registry.access.redhat.com/rhdh/red-hat-developer-hub-backstage-plugin-orchestrator@sha256:062a536d266bcd76d454fc9fdc0157b99e62074f6d3304578a68f515ced83e64"
        disabled: true
      - package: "oci://registry.access.redhat.com/rhdh/red-hat-developer-hub-backstage-plugin-orchestrator-backend@sha256:365d67fddeeaa2cf0b0266b012eb3e74fb5d5071b848059662353e62e7f9ceab"
        disabled: true
      - package: "oci://registry.access.redhat.com/rhdh/red-hat-developer-hub-backstage-plugin-scaffolder-backend-module-orchestrator@sha256:5b52adc153afcf79fb134262aa01b1e117085bf59c1a1997ff2e3a6f31c7647a"
        disabled: true
      - package: "oci://registry.access.redhat.com/rhdh/red-hat-developer-hub-backstage-plugin-orchestrator-form-widgets@sha256:b8d9886e39fa1262bfe1046f6ec5825b8e576c4997c744e0f90f722453f35aec"
        disabled: true
