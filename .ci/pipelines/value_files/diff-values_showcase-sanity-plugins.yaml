global:
  dynamic:
    plugins:
      #  sanity check https://issues.redhat.com/browse/RHIDP-5301
      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-plugin-catalog-backend-module-gitlab-org:{{ "{{" }}inherit{{ "}}" }}'
        enabled: true
        pluginConfig:
          catalog:
            providers:
              gitlab:
                orgProvider:
                  host: temp
                  schedule:
                    frequency:
                      hours: 24
                    initialDelay:
                      seconds: 15
                    timeout:
                      minutes: 15
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/roadiehq-backstage-plugin-github-insights:bs_1.49.4__3.5.0"
        enabled: true
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/roadiehq-backstage-plugin-security-insights:bs_1.49.4__3.3.1"
        enabled: true
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-plugin-scaffolder-backend-module-gitlab:bs_1.52.0__0.11.7
        enabled: true
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/immobiliarelabs-backstage-plugin-gitlab:bs_1.49.4__7.0.1"
        enabled: true
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/roadiehq-backstage-plugin-argo-cd-backend:bs_1.49.4__4.8.0"
        enabled: true
        pluginConfig:
          argocd:
            username: "temp"
            password: "temp"
            appLocatorMethods:
              - type: "config"
                instances:
                  - name: argoInstance1
                    url: "temp"
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/roadiehq-scaffolder-backend-argocd:bs_1.49.4__1.8.1"
        enabled: false
        pluginConfig:
          argocd:
            username: "temp"
            password: "temp"
            appLocatorMethods:
              - type: "config"
                instances:
                  - name: argoInstance1
                    url: "temp"
                    token: "temp"
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-argocd:bs_1.49.4__2.8.0"
        enabled: true
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-plugin-scaffolder-backend-module-azure:bs_1.49.4__0.2.19"
        enabled: true
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-azure-devops-backend:bs_1.49.4__0.27.0"
        enabled: true
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-azure-devops:bs_1.49.4__0.29.0"
        enabled: true
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-jenkins-backend:bs_1.49.4__0.27.0"
        enabled: true
        pluginConfig:
          jenkins:
            instances:
              - name: default
                baseUrl: "temp"
                username: "temp"
                apiKey: "temp"
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-jenkins:bs_1.49.4__0.30.0"
        enabled: true
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-sonarqube-backend:bs_1.49.4__1.1.0"
        enabled: true
        pluginConfig:
          sonarqube:
            instances:
              - name: default
                instanceKey: "mySonarqube"
                baseUrl: "https://default-sonarqube.example.com"
                apiKey: "123456789abcdef0123456789abcedf012"
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-sonarqube:bs_1.49.4__1.1.0"
        enabled: true
      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-dynamic-home-page:{{ "{{" }}inherit{{ "}}" }}'
        enabled: true
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/pagerduty-backstage-plugin:bs_1.49.4__0.18.0"
        enabled: false
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/pagerduty-backstage-plugin-backend:bs_1.49.4__0.11.0"
        enabled: false
        pluginConfig:
          pagerDuty:
            apiBaseUrl: "temp"
            oauth:
              clientId: "temp"
              clientSecret: "temp"
              subDomain: "temp"
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-plugin-scaffolder-backend-module-gerrit:bs_1.49.4__0.2.19"
        enabled: true
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/roadiehq-scaffolder-backend-module-utils:bs_1.49.4__4.1.2"
        enabled: true
      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-scaffolder-backend-module-regex:{{ "{{" }}inherit{{ "}}" }}'
        enabled: true
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-scaffolder-backend-module-servicenow:bs_1.49.4__2.15.0"
        enabled: false
        pluginConfig:
          servicenow:
            # The base url of the ServiceNow instance.
            baseUrl: "temp"
            # The username to use for authentication.
            username: "temp"
            # The password to use for authentication.
            password: "temp"
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-scaffolder-backend-module-sonarqube:bs_1.49.4__2.15.0"
        enabled: true
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-3scale-backend:bs_1.49.4__3.13.0"
        enabled: false
        pluginConfig:
          catalog:
            providers:
              threeScaleApiEntity:
                default:
                  baseUrl: "temp"
                  accessToken: "temp"
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-plugin-scaffolder-backend-module-bitbucket-cloud:bs_1.49.4__0.3.4"
        enabled: true
        pluginConfig:
          # https://backstage.io/docs/integrations/bitbucketCloud/discovery#configuration
          catalog:
            providers:
              bitbucketCloud:
                default: # identifies your ingested dataset
                  workspace: "temp"
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-dynatrace:bs_1.49.4__10.17.0"
        enabled: true
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/roadiehq-backstage-plugin-jira:bs_1.49.4__2.14.0"
        enabled: true
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/roadiehq-backstage-plugin-datadog:bs_1.49.4__2.7.2"
        enabled: true
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-nexus-repository-manager:bs_1.49.4__1.23.1"
        enabled: true
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-jfrog-artifactory:bs_1.49.4__1.28.0"
        enabled: true
      - package: "oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-lighthouse:bs_1.49.4__0.20.0"
        enabled: true
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-catalog-backend-module-scaffolder-relation-processor:bs_1.52.0__2.15.0
        enabled: true
      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-plugin-catalog-backend-module-msgraph:{{ "{{" }}inherit{{ "}}" }}'
        enabled: true
        pluginConfig:
          catalog:
            providers:
              microsoftGraphOrg:
                providerId:
                  target: https://graph.microsoft.com/v1.0
                  tenantId: temp
                  clientId: temp
                  clientSecret: temp
                  schedule:
                    # Let's perform a single execution per test run
                    frequency:
                      hours: 24
                    initialDelay:
                      seconds: 15
                    timeout:
                      minutes: 15
      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-plugin-catalog-backend-module-ldap:{{ "{{" }}inherit{{ "}}" }}'
        enabled: true
        pluginConfig:
          catalog:
            providers:
              ldapOrg:
                default:
                  target: ldap://temp
                  bind:
                    dn: temp
                    secret: temp
                  users:
                    - dn: temp
                      options:
                        filter: (uid=*)
                  groups:
                    - dn: temp
                      options:
                        filter: (cn=*)
                  schedule:
                    # Let's perform a single execution per test run
                    frequency:
                      hours: 24
                    initialDelay:
                      seconds: 15
                    timeout:
                      minutes: 15
      - package: oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-catalog-backend-module-pingidentity:bs_1.52.0__0.13.0
        enabled: true
        pluginConfig:
          catalog:
            providers:
              pingIdentityOrg:
                default:
                  apiPath: temp
                  authPath: temp
                  envId: temp
                  clientId: temp
                  clientSecret: temp
                  schedule:
                    frequency:
                      hours: 24
                    initialDelay:
                      seconds: 15
                    timeout:
                      minutes: 15
