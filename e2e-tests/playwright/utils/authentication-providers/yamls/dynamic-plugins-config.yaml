includes: []
plugins:
  - package: ./dynamic-plugins/dist/backstage-community-plugin-catalog-backend-module-keycloak-dynamic
    enabled: false
  - package: ./dynamic-plugins/dist/backstage-plugin-catalog-backend-module-github-org-dynamic
    enabled: false
  - package: oci://quay.io/rh-ee-jhe/catalog-github-org-transformer:v0.3.0!internal-backstage-plugin-catalog-backend-module-github-org-transformer
    enabled: false
  - package: ./dynamic-plugins/dist/backstage-plugin-catalog-backend-module-msgraph-dynamic
    enabled: false
  - package: ./dynamic-plugins/dist/backstage-community-plugin-rbac
    enabled: false
  # Global header: top bar + profile dropdown (Settings / Sign-out).
  # Auth CI uses includes: [] so defaults (including global-header) are not
  # loaded. Mirror the local-harness full pluginConfig so Settings POM locators
  # (KeyboardArrowDownOutlinedIcon / profile.settings) work after login.
  - package: ./dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-global-header
    enabled: true
    pluginConfig:
      dynamicPlugins:
        frontend:
          red-hat-developer-hub.backstage-plugin-global-header:
            translationResources:
              - importName: globalHeaderTranslations
                ref: globalHeaderTranslationRef
            mountPoints:
              - mountPoint: application/header
                importName: GlobalHeader
                config:
                  position: above-sidebar
              - mountPoint: global.header/component
                importName: CompanyLogo
                config:
                  priority: 200
                  props:
                    to: "/"
              - mountPoint: global.header/component
                importName: SearchComponent
                config:
                  priority: 100
              - mountPoint: global.header/component
                importName: Spacer
                config:
                  priority: 99
                  props:
                    growFactor: 0
              - mountPoint: global.header/component
                importName: HeaderIconButton
                config:
                  priority: 90
                  props:
                    title: Self-service
                    titleKey: create.title
                    icon: add
                    to: create
              - mountPoint: global.header/component
                importName: StarredDropdown
                config:
                  priority: 85
              - mountPoint: global.header/component
                importName: ApplicationLauncherDropdown
                config:
                  priority: 82
              - mountPoint: global.header/application-launcher
                importName: MenuItemLink
                config:
                  section: Documentation
                  priority: 150
                  props:
                    title: Developer Hub
                    titleKey: applicationLauncher.developerHub
                    icon: developerHub
                    link: https://docs.redhat.com/en/documentation/red_hat_developer_hub
              - mountPoint: global.header/application-launcher
                importName: MenuItemLink
                config:
                  section: Developer Tools
                  priority: 100
                  props:
                    title: RHDH Local
                    titleKey: applicationLauncher.rhdhLocal
                    icon: developerHub
                    link: https://github.com/redhat-developer/rhdh-local
              - mountPoint: global.header/component
                importName: HelpDropdown
                config:
                  priority: 80
              - mountPoint: global.header/help
                importName: SupportButton
                config:
                  priority: 10
              - mountPoint: global.header/component
                importName: NotificationButton
                config:
                  priority: 70
              - mountPoint: global.header/component
                importName: Divider
                config:
                  priority: 50
              - mountPoint: global.header/component
                importName: ProfileDropdown
                config:
                  priority: 10
              - mountPoint: global.header/profile
                importName: MenuItemLink
                config:
                  priority: 100
                  props:
                    title: Settings
                    titleKey: profile.settings
                    link: /settings
                    icon: manageAccounts
              - mountPoint: global.header/profile
                importName: MenuItemLink
                config:
                  priority: 90
                  props:
                    title: My profile
                    titleKey: profile.myProfile
                    type: myProfile
                    icon: account
              - mountPoint: global.header/profile
                importName: LogoutButton
                config:
                  priority: 10
